        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "第一类曲线积分", instanceName: "曲线形构件的质量", profession: "材料力学 线密度分布", descShort: "∫ρ ds 求变密度曲线梁质量。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "第二类曲线积分", instanceName: "变力沿曲线做功", profession: "物理学 力场", descShort: "∫ F·dr 计算力场总功。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "格林公式", instanceName: "地图测面积", profession: "地理学 制图", descShort: "使用边界曲线积分算不规则图形面积。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "第一类曲面积分", instanceName: "曲面薄片质量", profession: "机械工程 壳体设计", descShort: "曲面面密度积分优化薄壳结构。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "第二类曲面积分", instanceName: "管道流量计算", profession: "流体力学 管道流量", descShort: "通量 ∬ v·dS 求单位时间流量。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "高斯公式", instanceName: "电磁场通量", profession: "电磁学 场论", descShort: "散度定理联系通量与体积分。" },
        { chapter: "vector", chapterName: "曲线/曲面积分", subTopic: "斯托克斯公式", instanceName: "流体涡量", profession: "流体力学 涡流分析", descShort: "环量与旋度关系分析涡通量。" },
        { chapter: "series", chapterName: "无穷级数", subTopic: "等比级数", instanceName: "PageRank算法", profession: "计算机科学 网络爬虫", descShort: "马尔科夫链收敛与特征值。" },
        { chapter: "series", chapterName: "无穷级数", subTopic: "幂级数", instanceName: "三角函数值计算", profession: "数值分析 计算数学", descShort: "泰勒展开求sin,cos近似值。" },
        { chapter: "series", chapterName: "无穷级数", subTopic: "泰勒级数", instanceName: "非线性模型线性化", profession: "控制工程 系统辨识", descShort: "围绕工作点线性化。" },
        { chapter: "series", chapterName: "无穷级数", subTopic: "傅里叶级数", instanceName: "信号频谱分析", profession: "电子信息 通信工程", descShort: "将时域信号分解为频域谐波。" },
        { chapter: "series", chapterName: "无穷级数", subTopic: "傅里叶变换", instanceName: "图像压缩", profession: "计算机工程 JPEG编码", descShort: "离散余弦变换压缩冗余数据。" }
    ];

    casesData.forEach(item => {
        if(item.instanceName.includes("可乐瓶") || item.instanceName.includes("轻量化")) {
            item.highlight = true;
        }
    });

    const chaptersMap = new Map();
    casesData.forEach(c => {
        if(!chaptersMap.has(c.chapter)) {
            chaptersMap.set(c.chapter, { name: c.chapterName, count: 0 });
        }
        chaptersMap.get(c.chapter).count++;
    });

    const navDiv = document.getElementById('chapterNav');
    const chapterOrder = ["limit","derivative","derivative_app","integral","ode","multivar","multint","vector","series"];

    const allBtn = document.createElement('button');
    allBtn.className = 'chapter-btn active';
    allBtn.innerText = `全部 (${casesData.length})`;
    allBtn.addEventListener('click', () => {
        document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
        allBtn.classList.add('active');
        renderCards(casesData);
    });
    navDiv.appendChild(allBtn);

    chapterOrder.forEach(key => {
        if(chaptersMap.has(key)) {
            const btn = document.createElement('button');
            btn.className = 'chapter-btn';
            btn.innerText = `${chaptersMap.get(key).name} (${chaptersMap.get(key).count})`;
            btn.dataset.chapter = key;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
                btn.classList.add('active');
                filterByChapter(key);
            });
            navDiv.appendChild(btn);
        }
    });

    function filterByChapter(chapterKey) {
        const filtered = casesData.filter(c => c.chapter === chapterKey);
        renderCards(filtered);
        document.getElementById('casesContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderCards(dataArray) {
        const container = document.getElementById('casesContainer');
        container.innerHTML = '';
        if(dataArray.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:3rem;color:#5b6e8c;font-size:1.1rem;">✨ 暂无案例，请切换其他章节 ✨</div>';
            return;
        }
        dataArray.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'case-card';
            if(item.highlight) card.classList.add('highlight');
            card.innerHTML = `
                <div class="case-domain">
                    <span class="case-chapter">${item.chapterName}</span>
                    <span class="case-tag">${item.subTopic}</span>
                </div>
                <div class="case-title">📐 ${item.instanceName}</div>
                <div class="case-instance">${item.subTopic}</div>
                <div class="case-profession"><i class="fas fa-graduation-cap"></i> ${item.profession}</div>
            `;
            card.addEventListener('click', () => openModal(item));
            container.appendChild(card);
        });
    }

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function openModal(item) {
        // ==============================================
        // 👇 关键代码：点击可乐瓶 → 跳转到你的网页
        // ==============================================
        if (item.instanceName.includes("可乐瓶")) {
            window.open("5版 导数的应用——可乐瓶优化设计.html", "_blank");
            return;
        }

        let mathHint = '';
        if(item.instanceName.includes("轻量化")) {
            mathHint = `<div class="math-expr">⚙️ 质心公式：x̄ = (∬ x·ρ dA)/M，结合应力分析移除低贡献材料，实现轻量化与结构平衡。</div>`;
        } else if(item.subTopic.includes("梯度")) {
            mathHint = `<div class="math-expr">∇f 方向导数最大值，热流沿梯度反向流动。</div>`;
        } else if(item.subTopic.includes("傅里叶")) {
            mathHint = `<div class="math-expr">🎵 频域分解：f(t)=∑ c_n e^{int}，信号处理核心。</div>`;
        } else {
            mathHint = `<div class="math-expr">🧠 数学内核：${item.subTopic} 知识点结合 ${item.profession} 实际场景，实现精准建模与决策。</div>`;
        }

        modalTitle.innerText = `${item.instanceName}`;
        modalBody.innerHTML = `
            <p><strong>所属领域：</strong> ${item.profession}</p>
            <p><strong>数学分支：</strong> ${item.chapterName} ｜ ${item.subTopic}</p>
            <p>📖 ${item.descShort}</p>
            ${mathHint}
            <p style="margin-top:12px; border-left: 2px solid #3b82f6; padding-left:12px;">🔍 点击外部或关闭按钮，继续探索更多案例。</p>
        `;
        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
        if(e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') closeModal();
    });

    renderCards(casesData);
</script>
</body>
</html>
